services:
  frontend:
    image: python:3.11-slim
    restart: unless-stopped
    working_dir: /site
    command: python -m http.server 3000 --bind 0.0.0.0
    ports:
      - "3001:3000"
    volumes:
      - .:/site:ro
    depends_on:
      - vad-backend
    networks:
      - dokploy-network

  vad-backend:
    build:
      context: ./vad-backend
    restart: unless-stopped
    command: uvicorn server_gateway:app --host 0.0.0.0 --port 8000
    ports:
      - "8001:8000"

    labels:
    - "traefik.enable=true"
    - "traefik.docker.network=dokploy-network"

    - "traefik.http.routers.vad-audio.rule=Host(`api.omni.elvismao.com`) && PathPrefix(`/sessions`)"
    - "traefik.http.routers.vad-audio.entrypoints=websecure"
    - "traefik.http.routers.vad-audio.tls=true"
    - "traefik.http.routers.vad-audio.tls.certresolver=letsencrypt"
    - "traefik.http.routers.vad-audio.priority=10000"
    - "traefik.http.routers.vad-audio.service=vad-audio"

    - "traefik.http.services.vad-audio.loadbalancer.server.port=8000"

    volumes:
      - model-cache:/root/.cache
    environment:
      PYTHONUNBUFFERED: "1"
      XDG_CACHE_HOME: /root/.cache
      TORCH_HOME: /root/.cache/torch
      MODELSCOPE_CACHE: /root/.cache/modelscope
      HF_HOME: /root/.cache/huggingface
      ASR_DEVICE: ${ASR_DEVICE:-auto}
      FUNASR_DISABLE_PUNC: ${FUNASR_DISABLE_PUNC:-0}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 600s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - dokploy-network

volumes:
  model-cache:

networks:
  dokploy-network:
    external: true
