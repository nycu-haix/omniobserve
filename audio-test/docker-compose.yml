name: ${COMPOSE_PROJECT_NAME:-omniobserve-vad}

services:
  frontend:
    image: python:3.11-slim
    restart: unless-stopped
    working_dir: /site
    command: python -m http.server 3000 --bind 0.0.0.0
    expose:
      - "3000"
    volumes:
      - .:/site:ro
    depends_on:
      - vad-backend
    networks:
      - dokploy-network

  vad-backend:
    build:
      context: ./vad-backend
    restart: unless-stopped
    command: uvicorn server_gateway:app --host 0.0.0.0 --port 8000
    depends_on:
      whisperlivekit-0:
        condition: service_healthy
      whisperlivekit-1:
        condition: service_healthy
    # Dokploy routes this service through Traefik; avoid binding host port 8001,
    # which can collide with other deployments on the shared server.
    expose:
      - "8000"

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"

      - "traefik.http.routers.${VAD_ROUTER_NAME:-vad-audio}.rule=Host(`${VAD_API_DOMAIN:-api.omni.observe.tw}`) && PathPrefix(`${VAD_PATH_PREFIX:-/sessions}`)"
      - "traefik.http.routers.${VAD_ROUTER_NAME:-vad-audio}.entrypoints=websecure"
      - "traefik.http.routers.${VAD_ROUTER_NAME:-vad-audio}.tls=true"
      - "traefik.http.routers.${VAD_ROUTER_NAME:-vad-audio}.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${VAD_ROUTER_NAME:-vad-audio}.priority=10000"
      - "traefik.http.routers.${VAD_ROUTER_NAME:-vad-audio}.service=${VAD_SERVICE_NAME:-vad-audio}"

      - "traefik.http.routers.${VAD_ROUTER_NAME:-vad-audio}-alias.rule=(${VAD_API_ALIAS_HOST_RULE:-Host(`disabled-vad-api-alias.invalid`)}) && PathPrefix(`${VAD_PATH_PREFIX:-/sessions}`)"
      - "traefik.http.routers.${VAD_ROUTER_NAME:-vad-audio}-alias.entrypoints=websecure"
      - "traefik.http.routers.${VAD_ROUTER_NAME:-vad-audio}-alias.tls=true"
      - "traefik.http.routers.${VAD_ROUTER_NAME:-vad-audio}-alias.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${VAD_ROUTER_NAME:-vad-audio}-alias.priority=10000"
      - "traefik.http.routers.${VAD_ROUTER_NAME:-vad-audio}-alias.service=${VAD_SERVICE_NAME:-vad-audio}"

      - "traefik.http.routers.${VAD_ROUTER_NAME:-vad-audio}-prefixed.rule=Host(`${VAD_API_DOMAIN:-api.omni.observe.tw}`) && PathPrefix(`${VAD_STRIP_PREFIX:-/asr}${VAD_PATH_PREFIX:-/sessions}`)"
      - "traefik.http.routers.${VAD_ROUTER_NAME:-vad-audio}-prefixed.entrypoints=websecure"
      - "traefik.http.routers.${VAD_ROUTER_NAME:-vad-audio}-prefixed.tls=true"
      - "traefik.http.routers.${VAD_ROUTER_NAME:-vad-audio}-prefixed.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${VAD_ROUTER_NAME:-vad-audio}-prefixed.priority=10001"
      - "traefik.http.routers.${VAD_ROUTER_NAME:-vad-audio}-prefixed.middlewares=${VAD_ROUTER_NAME:-vad-audio}-strip"
      - "traefik.http.routers.${VAD_ROUTER_NAME:-vad-audio}-prefixed.service=${VAD_SERVICE_NAME:-vad-audio}"
      - "traefik.http.middlewares.${VAD_ROUTER_NAME:-vad-audio}-strip.stripprefix.prefixes=${VAD_STRIP_PREFIX:-/asr}"

      - "traefik.http.routers.${VAD_ROUTER_NAME:-vad-audio}-prefixed-alias.rule=(${VAD_API_ALIAS_HOST_RULE:-Host(`disabled-vad-api-alias.invalid`)}) && PathPrefix(`${VAD_STRIP_PREFIX:-/asr}${VAD_PATH_PREFIX:-/sessions}`)"
      - "traefik.http.routers.${VAD_ROUTER_NAME:-vad-audio}-prefixed-alias.entrypoints=websecure"
      - "traefik.http.routers.${VAD_ROUTER_NAME:-vad-audio}-prefixed-alias.tls=true"
      - "traefik.http.routers.${VAD_ROUTER_NAME:-vad-audio}-prefixed-alias.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${VAD_ROUTER_NAME:-vad-audio}-prefixed-alias.priority=10001"
      - "traefik.http.routers.${VAD_ROUTER_NAME:-vad-audio}-prefixed-alias.middlewares=${VAD_ROUTER_NAME:-vad-audio}-strip"
      - "traefik.http.routers.${VAD_ROUTER_NAME:-vad-audio}-prefixed-alias.service=${VAD_SERVICE_NAME:-vad-audio}"

      - "traefik.http.routers.${VAD_ROUTER_NAME:-vad-audio}-ai-alias.rule=${VAD_AI_ALIAS_HOST_RULE:-Host(`disabled-vad-ai-alias.invalid`)}"
      - "traefik.http.routers.${VAD_ROUTER_NAME:-vad-audio}-ai-alias.entrypoints=websecure"
      - "traefik.http.routers.${VAD_ROUTER_NAME:-vad-audio}-ai-alias.tls=true"
      - "traefik.http.routers.${VAD_ROUTER_NAME:-vad-audio}-ai-alias.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${VAD_ROUTER_NAME:-vad-audio}-ai-alias.service=${VAD_SERVICE_NAME:-vad-audio}"

      - "traefik.http.services.${VAD_SERVICE_NAME:-vad-audio}.loadbalancer.server.port=8000"

    volumes:
      - model-cache:/root/.cache
    environment:
      PYTHONUNBUFFERED: "1"
      XDG_CACHE_HOME: /root/.cache
      TORCH_HOME: /root/.cache/torch
      MODELSCOPE_CACHE: /root/.cache/modelscope
      HF_HOME: /root/.cache/huggingface
      ASR_ENGINE: ${ASR_ENGINE:-whisperlivekit}
      WHISPERLIVEKIT_WS_URLS: ${WHISPERLIVEKIT_WS_URLS:-ws://whisperlivekit-0:8000/asr,ws://whisperlivekit-1:8000/asr}
      WHISPERLIVEKIT_MODE: ${WHISPERLIVEKIT_MODE:-full}
      WHISPERLIVEKIT_FINAL_SILENCE_SEC: ${WHISPERLIVEKIT_FINAL_SILENCE_SEC:-2.0}
      WHISPERLIVEKIT_GATEWAY_SILENCE_RMS: ${WHISPERLIVEKIT_GATEWAY_SILENCE_RMS:-0.0012}
      WHISPERLIVEKIT_GATEWAY_SPEECH_PEAK: ${WHISPERLIVEKIT_GATEWAY_SPEECH_PEAK:-0.012}
      WHISPERLIVEKIT_SPEECH_RESUME_SEC: ${WHISPERLIVEKIT_SPEECH_RESUME_SEC:-0.2}
      WHISPERLIVEKIT_SEND_QUEUE_CHUNKS: ${WHISPERLIVEKIT_SEND_QUEUE_CHUNKS:-48}
      WHISPERLIVEKIT_SEND_TIMEOUT_SEC: ${WHISPERLIVEKIT_SEND_TIMEOUT_SEC:-2.0}
      WHISPERLIVEKIT_MAX_QUEUE_LAG_SEC: ${WHISPERLIVEKIT_MAX_QUEUE_LAG_SEC:-3.0}
      WHISPERLIVEKIT_TRANSCRIPT_STALL_SEC: ${WHISPERLIVEKIT_TRANSCRIPT_STALL_SEC:-15.0}
      WHISPERLIVEKIT_RECOVERY_BUFFER_SEC: ${WHISPERLIVEKIT_RECOVERY_BUFFER_SEC:-5.0}
      WHISPERLIVEKIT_MAX_SPEECH_SEC: ${WHISPERLIVEKIT_MAX_SPEECH_SEC:-0}
      WHISPERLIVEKIT_DRAFT_EDITABLE_TAIL_CHARS: ${WHISPERLIVEKIT_DRAFT_EDITABLE_TAIL_CHARS:-10}
      WHISPERLIVEKIT_DRAFT_EDITABLE_TAIL_RATIO: ${WHISPERLIVEKIT_DRAFT_EDITABLE_TAIL_RATIO:-0.0}
      WHISPERLIVEKIT_DRAFT_MIN_LOCKED_PREFIX_CHARS: ${WHISPERLIVEKIT_DRAFT_MIN_LOCKED_PREFIX_CHARS:-8}
      PIPELINE_WS_BASE_URL: ${PIPELINE_WS_BASE_URL:-wss://api.omni.observe.tw}
      PIPELINE_PERSIST_TIMEOUT_SEC: ${PIPELINE_PERSIST_TIMEOUT_SEC:-10}
      PIPELINE_FINAL_RELAY_RETRIES: ${PIPELINE_FINAL_RELAY_RETRIES:-3}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 600s
    networks:
      - dokploy-network

  whisperlivekit-0:
    build:
      context: ./whisperlivekit
    restart: unless-stopped
    # Keep WhisperLiveKit VAD enabled; silent audio is filtered before encoder work.
    # SimulStreaming uses AlignAtt and a growing audio buffer instead of fixed windows.
    # PyTorch cu121 plus NVIDIA runtime lets the whisper backend use GPU/fp16 on CUDA 12.2-era drivers.
    command:
      - "--backend"
      - "whisper"
      - "--model-path"
      - "${WHISPERLIVEKIT_MODEL_PATH:-MediaTek-Research/Breeze-ASR-25}"
      - "--language"
      - "zh"
      - "--backend-policy"
      - "simulstreaming"
      - "--frame-threshold"
      - "${WHISPERLIVEKIT_FRAME_THRESHOLD:-15}"
      - "--static-init-prompt"
      - "${WHISPERLIVEKIT_STATIC_INIT_PROMPT:-繁體中文會議內容，可能包含英文人名、縮寫與技術名詞。}"
      - "--pcm-input"
    expose:
      - "8000"
    volumes:
      - ${BREEZE_ASR_25_MODEL_PATH:-../models/Breeze-ASR-25}:/models/Breeze-ASR-25:ro
      - model-cache:/root/.cache
    environment:
      PYTHONUNBUFFERED: "1"
      HF_HOME: /root/.cache/huggingface
      NVIDIA_VISIBLE_DEVICES: "0"
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 600s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    networks:
      - dokploy-network

  whisperlivekit-1:
    build:
      context: ./whisperlivekit
    restart: unless-stopped
    command:
      - "--backend"
      - "whisper"
      - "--model-path"
      - "${WHISPERLIVEKIT_MODEL_PATH:-MediaTek-Research/Breeze-ASR-25}"
      - "--language"
      - "zh"
      - "--backend-policy"
      - "simulstreaming"
      - "--frame-threshold"
      - "${WHISPERLIVEKIT_FRAME_THRESHOLD:-15}"
      - "--static-init-prompt"
      - "${WHISPERLIVEKIT_STATIC_INIT_PROMPT:-繁體中文會議內容，可能包含英文人名、縮寫與技術名詞。}"
      - "--pcm-input"
    expose:
      - "8000"
    volumes:
      - ${BREEZE_ASR_25_MODEL_PATH:-../models/Breeze-ASR-25}:/models/Breeze-ASR-25:ro
      - model-cache:/root/.cache
    environment:
      PYTHONUNBUFFERED: "1"
      HF_HOME: /root/.cache/huggingface
      NVIDIA_VISIBLE_DEVICES: "1"
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 600s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    networks:
      - dokploy-network

volumes:
  model-cache:

networks:
  dokploy-network:
    external: true
