services:
  web:
    image: jitsi/web:${JITSI_IMAGE_VERSION:-stable-10888}
    restart: ${RESTART_POLICY:-unless-stopped}
    env_file:
      - .env
    volumes:
      - web-config:/config
      - web-crontabs:/var/spool/cron/crontabs
      - transcripts:/usr/share/jitsi-meet/transcripts
      - web-load-test:/usr/share/jitsi-meet/load-test
    environment:
      TZ: ${TZ:-Asia/Taipei}
      PUBLIC_URL: https://${MEET_DOMAIN:-meet.omni.observe.tw}
      DISABLE_HTTPS: ${DISABLE_HTTPS:-1}
      ENABLE_HTTP_REDIRECT: ${ENABLE_HTTP_REDIRECT:-0}
      ENABLE_LETSENCRYPT: ${ENABLE_LETSENCRYPT:-0}
      ENABLE_AUTH: ${ENABLE_AUTH:-0}
      ENABLE_GUESTS: ${ENABLE_GUESTS:-1}
      BOSH_RELATIVE: ${BOSH_RELATIVE:-1}
      ENABLE_XMPP_WEBSOCKET: ${ENABLE_XMPP_WEBSOCKET:-1}
      ENABLE_COLIBRI_WEBSOCKET: "1"
      COLIBRI_WEBSOCKET_PORT: "9090"
      COLIBRI_WEBSOCKET_JVB_LOOKUP_NAME: jvb
      DISABLE_COLIBRI_WEBSOCKET_JVB_LOOKUP: "0"
      COLIBRI_WEBSOCKET_REGEX: jvb
      ENABLE_P2P: ${ENABLE_P2P:-1}
      ENABLE_PREJOIN_PAGE: ${ENABLE_PREJOIN_PAGE:-1}
      ENABLE_WELCOME_PAGE: ${ENABLE_WELCOME_PAGE:-1}
      RESOLUTION: ${RESOLUTION:-720}
      RESOLUTION_WIDTH: ${RESOLUTION_WIDTH:-1280}
      START_AUDIO_MUTED: ${START_AUDIO_MUTED:-10}
      START_VIDEO_MUTED: ${START_VIDEO_MUTED:-10}
      XMPP_DOMAIN: ${XMPP_DOMAIN:-meet.jitsi}
      XMPP_AUTH_DOMAIN: ${XMPP_AUTH_DOMAIN:-auth.meet.jitsi}
      XMPP_GUEST_DOMAIN: ${XMPP_GUEST_DOMAIN:-guest.meet.jitsi}
      XMPP_MUC_DOMAIN: ${XMPP_MUC_DOMAIN:-muc.meet.jitsi}
      XMPP_RECORDER_DOMAIN: ${XMPP_RECORDER_DOMAIN:-recorder.meet.jitsi}
      XMPP_PORT: ${XMPP_PORT:-5222}
      JVB_PREFER_SCTP: "0"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${DOKPLOY_NETWORK:-dokploy-network}"
      - "traefik.http.routers.meet.rule=Host(`${MEET_DOMAIN:-meet.omni.observe.tw}`)"
      - "traefik.http.routers.meet.entrypoints=websecure"
      - "traefik.http.routers.meet.tls=true"
      - "traefik.http.routers.meet.tls.certresolver=letsencrypt"
      - "traefik.http.routers.meet.service=meet"
      - "traefik.http.services.meet.loadbalancer.server.port=80"
      - "traefik.http.routers.meet-http.rule=Host(`${MEET_DOMAIN:-meet.omni.observe.tw}`)"
      - "traefik.http.routers.meet-http.entrypoints=web"
      - "traefik.http.routers.meet-http.middlewares=meet-https"
      - "traefik.http.middlewares.meet-https.redirectscheme.scheme=https"
    depends_on:
      - prosody
      - jicofo
      - jvb
    networks:
      - meet-jitsi
      - dokploy-network

  prosody:
    image: jitsi/prosody:${JITSI_IMAGE_VERSION:-stable-10888}
    restart: ${RESTART_POLICY:-unless-stopped}
    env_file:
      - .env
    expose:
      - "5222"
      - "5269"
      - "5280"
      - "5347"
    volumes:
      - prosody-config:/config
      - prosody-plugins-custom:/prosody-plugins-custom
    environment:
      TZ: ${TZ:-Asia/Taipei}
      PUBLIC_URL: https://${MEET_DOMAIN:-meet.omni.observe.tw}
      AUTH_TYPE: ${AUTH_TYPE:-internal}
      ENABLE_AUTH: ${ENABLE_AUTH:-0}
      ENABLE_GUESTS: ${ENABLE_GUESTS:-1}
      ENABLE_XMPP_WEBSOCKET: ${ENABLE_XMPP_WEBSOCKET:-1}
      TURN_CREDENTIALS: ${TURN_CREDENTIALS:-}
      TURN_USERNAME: ${TURN_USERNAME:-}
      TURN_PASSWORD: ${TURN_PASSWORD:-}
      TURN_HOST: ${TURN_HOST:-}
      TURNS_HOST: ${TURNS_HOST:-}
      TURN_PORT: ${TURN_PORT:-443}
      TURNS_PORT: ${TURNS_PORT:-443}
      TURN_TRANSPORT: ${TURN_TRANSPORT:-tcp}
      TURN_TTL: ${TURN_TTL:-86400}
      JICOFO_AUTH_PASSWORD: ${JICOFO_AUTH_PASSWORD}
      JVB_AUTH_USER: ${JVB_AUTH_USER:-jvb}
      JVB_AUTH_PASSWORD: ${JVB_AUTH_PASSWORD}
      XMPP_DOMAIN: ${XMPP_DOMAIN:-meet.jitsi}
      XMPP_AUTH_DOMAIN: ${XMPP_AUTH_DOMAIN:-auth.meet.jitsi}
      XMPP_GUEST_DOMAIN: ${XMPP_GUEST_DOMAIN:-guest.meet.jitsi}
      XMPP_MUC_DOMAIN: ${XMPP_MUC_DOMAIN:-muc.meet.jitsi}
      XMPP_INTERNAL_MUC_DOMAIN: ${XMPP_INTERNAL_MUC_DOMAIN:-internal-muc.meet.jitsi}
      XMPP_RECORDER_DOMAIN: ${XMPP_RECORDER_DOMAIN:-recorder.meet.jitsi}
      XMPP_PORT: ${XMPP_PORT:-5222}
    networks:
      meet-jitsi:
        aliases:
          - ${XMPP_SERVER:-xmpp.meet.jitsi}

  jicofo:
    image: jitsi/jicofo:${JITSI_IMAGE_VERSION:-stable-10888}
    restart: ${RESTART_POLICY:-unless-stopped}
    env_file:
      - .env
    volumes:
      - jicofo-config:/config
    environment:
      TZ: ${TZ:-Asia/Taipei}
      ENABLE_AUTH: ${ENABLE_AUTH:-0}
      JICOFO_AUTH_PASSWORD: ${JICOFO_AUTH_PASSWORD}
      JVB_BREWERY_MUC: ${JVB_BREWERY_MUC:-jvbbrewery}
      XMPP_DOMAIN: ${XMPP_DOMAIN:-meet.jitsi}
      XMPP_AUTH_DOMAIN: ${XMPP_AUTH_DOMAIN:-auth.meet.jitsi}
      XMPP_INTERNAL_MUC_DOMAIN: ${XMPP_INTERNAL_MUC_DOMAIN:-internal-muc.meet.jitsi}
      XMPP_MUC_DOMAIN: ${XMPP_MUC_DOMAIN:-muc.meet.jitsi}
      XMPP_RECORDER_DOMAIN: ${XMPP_RECORDER_DOMAIN:-recorder.meet.jitsi}
      XMPP_SERVER: ${XMPP_SERVER:-xmpp.meet.jitsi}
      XMPP_PORT: ${XMPP_PORT:-5222}
    depends_on:
      - prosody
    networks:
      - meet-jitsi

  jvb:
    image: jitsi/jvb:${JITSI_IMAGE_VERSION:-stable-10888}
    restart: ${RESTART_POLICY:-unless-stopped}
    env_file:
      - .env
    ports:
      - "${JVB_PORT:-10000}:10000/udp"
      - "127.0.0.1:${JVB_COLIBRI_PORT:-8080}:8080"
    volumes:
      - jvb-config:/config
    environment:
      TZ: ${TZ:-Asia/Taipei}
      PUBLIC_URL: https://${MEET_DOMAIN:-meet.omni.observe.tw}
      COLIBRI_REST_ENABLED: ${COLIBRI_REST_ENABLED:-1}
      ENABLE_COLIBRI_WEBSOCKET: "1"
      JVB_ADVERTISE_IPS: ${JVB_ADVERTISE_IPS:-203.145.220.54}
      JVB_ADVERTISE_PRIVATE_CANDIDATES: "0"
      JVB_AUTH_USER: ${JVB_AUTH_USER:-jvb}
      JVB_AUTH_PASSWORD: ${JVB_AUTH_PASSWORD}
      JVB_BREWERY_MUC: ${JVB_BREWERY_MUC:-jvbbrewery}
      JVB_PORT: ${JVB_PORT:-10000}
      JVB_WS_DOMAIN: ${MEET_DOMAIN:-meet.omni.observe.tw}
      JVB_WS_SERVER_ID: jvb
      JVB_WS_TLS: "1"
      XMPP_AUTH_DOMAIN: ${XMPP_AUTH_DOMAIN:-auth.meet.jitsi}
      XMPP_INTERNAL_MUC_DOMAIN: ${XMPP_INTERNAL_MUC_DOMAIN:-internal-muc.meet.jitsi}
      XMPP_SERVER: ${XMPP_SERVER:-xmpp.meet.jitsi}
      XMPP_PORT: ${XMPP_PORT:-5222}
    depends_on:
      - prosody
    networks:
      - meet-jitsi

volumes:
  web-config:
  web-crontabs:
  web-load-test:
  transcripts:
  prosody-config:
  prosody-plugins-custom:
  jicofo-config:
  jvb-config:

networks:
  meet-jitsi:
  dokploy-network:
    external: true
    name: ${DOKPLOY_NETWORK:-dokploy-network}
