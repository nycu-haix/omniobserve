name: Deploy frontend

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"

concurrency:
  group: deploy-frontend-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, macOS]

    steps:
      - name: Build frontend
        shell: bash
        run: |
          set -euo pipefail

          cd /Users/skyhong/Documents/omniobserve/frontend

          git pull --ff-only origin main

          pnpm i
          pnpm build